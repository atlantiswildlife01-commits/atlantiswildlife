name: Atlantis Wildlife — Instagram Reels (10x/day)

on:
  schedule:
    - cron: '30 0 * * *'    # IST 06:00
    - cron: '0 2 * * *'     # IST 07:30
    - cron: '30 3 * * *'    # IST 09:00
    - cron: '0 5 * * *'     # IST 10:30
    - cron: '30 6 * * *'    # IST 12:00
    - cron: '0 8 * * *'     # IST 13:30
    - cron: '30 9 * * *'    # IST 15:00
    - cron: '30 11 * * *'   # IST 17:00
    - cron: '30 13 * * *'   # IST 19:00
    - cron: '30 15 * * *'   # IST 21:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Install dependencies
        run: pip install ddgs groq requests Pillow python-dotenv PyNaCl gtts edge-tts yt-dlp

      - name: Configure git
        run: |
          git config --global user.email "bot@atlantiswildlife.ai"
          git config --global user.name "Atlantis Wildlife Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post wildlife reels
        env:
          GROQ_API_KEY:                     ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:                   ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:                    ${{ secrets.IMGBB_API_KEY }}
          PIXABAY_API_KEY:                  ${{ secrets.PIXABAY_API_KEY }}
          NPS_API_KEY:                      ${{ secrets.NPS_API_KEY }}
          GH_PAT:                           ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:                ${{ github.repository }}
          GITHUB_TOKEN:                     ${{ secrets.GITHUB_TOKEN }}
          WILDLIFE_INSTAGRAM_ACCESS_TOKEN:  ${{ secrets.WILDLIFE_INSTAGRAM_ACCESS_TOKEN }}
          WILDLIFE_INSTAGRAM_ACCOUNT_ID:    ${{ secrets.WILDLIFE_INSTAGRAM_ACCOUNT_ID }}
        run: python agent.py