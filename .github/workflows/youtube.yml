name: Atlantis Wildlife — YouTube Shorts (6×/day)

# Budget: 6 uploads × 1600 units = 9,600/day (safe under 10,000 limit)
# Staggered 15 min after Instagram runs to avoid simultaneous load

on:
  schedule:
    - cron: '45 1 * * *'    # IST 07:15
    - cron: '45 4 * * *'    # IST 10:15
    - cron: '45 8 * * *'    # IST 14:15
    - cron: '45 12 * * *'   # IST 18:15
    - cron: '45 14 * * *'   # IST 20:15
    - cron: '45 16 * * *'   # IST 22:15
  workflow_dispatch:

jobs:
  youtube:
    if: false  # YouTube channel not set up yet — re-enable when ready
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: wildlife-pip-${{ hashFiles('**/requirements*.txt') }}-v1
          restore-keys: wildlife-pip-

      - name: Install dependencies
        run: pip install ddgs groq requests Pillow python-dotenv PyNaCl gtts edge-tts yt-dlp internetarchive

      - name: Configure git
        run: |
          git config --global user.email "bot@atlantiswildlife.ai"
          git config --global user.name "Atlantis Wildlife Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post YouTube Shorts
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:           ${{ secrets.PEXELS_API_KEY }}
          GH_PAT:                   ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          NPS_API_KEY:              ${{ secrets.NPS_API_KEY }}
          PIXABAY_API_KEY:          ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_TTS_API_KEY:       ${{ secrets.GOOGLE_TTS_API_KEY }}
          SARVAM_API_KEY:           ${{ secrets.SARVAM_API_KEY }}
          YOUTUBE_CLIENT_ID:        ${{ secrets.YOUTUBE_WILDLIFE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:    ${{ secrets.YOUTUBE_WILDLIFE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_WILDLIFE_REFRESH_TOKEN }}
          YOUTUBE_ONLY:             "true"
        run: python agent.py
